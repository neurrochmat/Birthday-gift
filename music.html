<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="🎵 Playlist musik spesial — Hadiah ulang tahun untuk Afri Finda Viana.">
    <title>🎵 Music - Happy Birthday!</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎵</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Main Console -->
    <div class="gameboy-console">
        <!-- Top Section -->
        <div class="console-top">
            <div class="power-section">
                <div class="power-led"></div>
                <span class="power-text">POWER</span>
            </div>
            <div class="brand-name">HEYTML-BOY</div>
        </div>

        <!-- Screen -->
        <div class="screen-frame">
            <div class="screen-inner">
                <div class="screen-content music-screen">
                    <div class="music-header">
                        <span class="music-icon">🎵</span>
                        <h2>HEYTML Music</h2>
                    </div>

                    <div class="music-player">
                        <div class="album-art">
                            <div class="vinyl-record" id="vinyl-record">
                                <div class="vinyl-center">💿</div>
                            </div>
                        </div>

                        <div class="song-info">
                            <div class="song-title" id="song-title">Pilih Lagu</div>
                            <div class="song-artist" id="song-artist">---</div>
                        </div>

                        <div class="progress-container">
                            <div class="progress-bar">
                                <div class="progress-fill" id="progress-fill"></div>
                            </div>
                            <div class="time-display">
                                <span id="current-time">0:00</span>
                                <span id="total-time">0:00</span>
                            </div>
                        </div>

                        <div class="player-controls">
                            <button class="control-btn" id="btn-prev-song" aria-label="Lagu sebelumnya">⏮</button>
                            <button class="control-btn play-btn" id="btn-play" aria-label="Play/Pause">▶</button>
                            <button class="control-btn" id="btn-next-song" aria-label="Lagu selanjutnya">⏭</button>
                        </div>
                    </div>

                    <div class="playlist">
                        <div class="playlist-header">📋 Playlist</div>
                        <div class="playlist-items" id="playlist-items">
                            <!-- Playlist items will be generated by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls Section -->
        <div class="controls-section">
            <div class="dpad">
                <div class="dpad-up" role="button" aria-label="D-pad atas"></div>
                <div class="dpad-down" role="button" aria-label="D-pad bawah"></div>
                <div class="dpad-left" role="button" aria-label="D-pad kiri"></div>
                <div class="dpad-right" role="button" aria-label="D-pad kanan"></div>
                <div class="dpad-center"></div>
            </div>

            <div class="action-buttons">
                <a href="gallery.html" class="btn-b" aria-label="Kembali ke Gallery">B</a>
                <a href="tetris.html" class="btn-a" aria-label="Lanjut ke Tetris">A</a>
            </div>
        </div>

        <!-- Bottom Section -->
        <div class="console-bottom">
            <div class="speaker-grille">
                <div class="speaker-line"></div>
                <div class="speaker-line"></div>
                <div class="speaker-line"></div>
                <div class="speaker-line"></div>
                <div class="speaker-line"></div>
                <div class="speaker-line"></div>
            </div>
            <div class="select-start">
                <a href="index.html" class="btn-select">HOME</a>
                <a href="tetris.html" class="btn-start">NEXT</a>
            </div>
        </div>
    </div>

    <!-- Hidden Audio Element -->
    <audio id="audio-player"></audio>

    <!-- Floating Hearts Background -->
    <div class="floating-hearts" id="floating-hearts"></div>

    <script src="js/common.js"></script>
    <script src="js/music.js"></script>
</body>

</html>
