<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="🎮 Game Tetris — Hadiah ulang tahun untuk Afri Finda Viana.">
    <title>🎮 Tetris - Happy Birthday!</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/tetris.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Main Console -->
    <div class="gameboy-console">
        <!-- Top Section -->
        <div class="console-top">
            <div class="power-section">
                <div class="power-led"></div>
                <span class="power-text">POWER</span>
            </div>
            <div class="brand-name">HEYTML-BOY</div>
        </div>

        <!-- Screen -->
        <div class="screen-frame">
            <div class="screen-inner">
                <div class="screen-content tetris-screen">
                    <div class="tetris-header">
                        <span class="tetris-icon">🎮</span>
                        <h2>TETRIS</h2>
                    </div>

                    <div class="tetris-container">
                        <div class="tetris-info-left">
                            <div class="info-box">
                                <div class="info-label">SCORE</div>
                                <div class="info-value" id="score">0</div>
                            </div>
                            <div class="info-box">
                                <div class="info-label">LEVEL</div>
                                <div class="info-value" id="level">1</div>
                            </div>
                            <div class="info-box">
                                <div class="info-label">LINES</div>
                                <div class="info-value" id="lines">0</div>
                            </div>
                        </div>

                        <div class="tetris-board-container">
                            <canvas id="tetris-board" width="120" height="240"></canvas>
                            <div class="game-overlay hidden" id="game-overlay">
                                <div class="overlay-content">
                                    <div class="overlay-title" id="overlay-title">TETRIS</div>
                                    <div class="overlay-message" id="overlay-message">Press START to play</div>
                                </div>
                            </div>
                        </div>

                        <div class="tetris-info-right">
                            <div class="info-box next-box">
                                <div class="info-label">NEXT</div>
                                <canvas id="next-piece" width="60" height="60"></canvas>
                            </div>
                        </div>
                    </div>

                    <div class="tetris-controls-hint">
                        <span>← → : Move</span>
                        <span>↑ : Rotate</span>
                        <span>↓ : Drop</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls Section -->
        <div class="controls-section">
            <div class="dpad" id="game-dpad">
                <div class="dpad-up" id="dpad-up" role="button" aria-label="Rotasi blok"></div>
                <div class="dpad-down" id="dpad-down" role="button" aria-label="Jatuhkan blok"></div>
                <div class="dpad-left" id="dpad-left" role="button" aria-label="Geser kiri"></div>
                <div class="dpad-right" id="dpad-right" role="button" aria-label="Geser kanan"></div>
                <div class="dpad-center"></div>
            </div>

            <div class="action-buttons">
                <a href="music.html" class="btn-b" aria-label="Kembali ke Music">B</a>
                <button class="btn-a" id="btn-rotate" aria-label="Rotasi blok">A</button>
            </div>
        </div>

        <!-- Bottom Section -->
        <div class="console-bottom">
            <div class="speaker-grille">
                <div class="speaker-line"></div>
                <div class="speaker-line"></div>
                <div class="speaker-line"></div>
                <div class="speaker-line"></div>
                <div class="speaker-line"></div>
                <div class="speaker-line"></div>
            </div>
            <div class="select-start">
                <a href="index.html" class="btn-select">HOME</a>
                <button class="btn-start" id="btn-start-game">START</button>
            </div>
        </div>
    </div>

    <!-- Floating Hearts Background -->
    <div class="floating-hearts" id="floating-hearts"></div>

    <script src="js/common.js"></script>
    <script src="js/tetris.js"></script>
</body>

</html>
