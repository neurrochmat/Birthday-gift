<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="🎂 Special birthday gift for someone special — from Neurrochmat with love.">
    <title>💕 For you, my loved one!</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-logo">HEYTML-BOY</div>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
            <div class="loading-text">Loading Game Data...</div>
        </div>
    </div>
    <script>
        // Only show loading screen on first visit
        if (sessionStorage.getItem('heytml-loaded')) {
            document.getElementById('loading-screen').style.display = 'none';
        } else {
            sessionStorage.setItem('heytml-loaded', 'true');
        }
    </script>

    <!-- Main Console -->
    <div class="gameboy-console">
        <!-- Top Section -->
        <div class="console-top">
            <div class="power-section">
                <div class="power-led"></div>
                <span class="power-text">POWER</span>
            </div>
            <div class="brand-name">HEYTML-BOY</div>
        </div>

        <!-- Screen -->
        <div class="screen-frame">
            <div class="screen-inner">
                <div class="screen-content" id="main-screen">
                    <div class="welcome-section">
                        <div class="birthday-icon">🎂</div>
                        <h1 class="welcome-title">Happy Birthday!</h1>
                        <h2 class="recipient-name">Afri Finda Viana</h2>
                        <p class="birthday-date">25 April</p>
                        <p class="from-text">From: Neurrochmat ❤️</p>
                    </div>

                    <!-- Menu Buttons -->
                    <div class="menu-grid">
                        <a href="message.html" class="menu-button" data-color="blue">
                            <span class="menu-icon">💌</span>
                            <span class="menu-label">Message</span>
                        </a>
                        <a href="gallery.html" class="menu-button" data-color="pink">
                            <span class="menu-icon">📸</span>
                            <span class="menu-label">Gallery</span>
                        </a>
                        <a href="music.html" class="menu-button" data-color="purple">
                            <span class="menu-icon">🎵</span>
                            <span class="menu-label">Music</span>
                        </a>
                        <a href="tetris.html" class="menu-button" data-color="green">
                            <span class="menu-icon">🎮</span>
                            <span class="menu-label">Tetris</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls Section -->
        <div class="controls-section">
            <div class="dpad">
                <div class="dpad-up" role="button" aria-label="D-pad atas"></div>
                <div class="dpad-down" role="button" aria-label="D-pad bawah"></div>
                <div class="dpad-left" role="button" aria-label="D-pad kiri"></div>
                <div class="dpad-right" role="button" aria-label="D-pad kanan"></div>
                <div class="dpad-center"></div>
            </div>

            <div class="action-buttons">
                <button class="btn-b" aria-label="Tombol B" disabled>B</button>
                <a href="message.html" class="btn-a" aria-label="Buka Message">A</a>
            </div>
        </div>

        <!-- Bottom Section -->
        <div class="console-bottom">
            <div class="speaker-grille">
                <div class="speaker-line"></div>
                <div class="speaker-line"></div>
                <div class="speaker-line"></div>
                <div class="speaker-line"></div>
                <div class="speaker-line"></div>
                <div class="speaker-line"></div>
            </div>
            <div class="select-start">
                <button class="btn-select">SELECT</button>
                <a href="message.html" class="btn-start">START</a>
            </div>
        </div>
    </div>

    <!-- Floating Hearts Background -->
    <div class="floating-hearts" id="floating-hearts"></div>

    <script src="js/common.js"></script>
</body>

</html>
